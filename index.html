<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iOS Signer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Art direction: iOS signing tool → precise, technical, dark-first
       Palette: deep dark surfaces, teal primary accent
       Typography: Geist (body) + Geist Mono (code/values)
       Density: balanced */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
    }

    :root, [data-theme="light"] {
      --color-bg: #f7f6f2;
      --color-surface: #f0efe9;
      --color-surface-2: #e8e7e1;
      --color-surface-offset: #dedad3;
      --color-border: oklch(0.28 0.005 80 / 0.12);
      --color-divider: oklch(0.28 0.005 80 / 0.08);
      --color-text: #1a1916;
      --color-text-muted: #6b6a65;
      --color-text-faint: #b0afa9;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-glow: oklch(0.48 0.08 192 / 0.15);
      --color-success: #437a22;
      --color-error: #a12c7b;
      --color-warning: #964219;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 4px 16px oklch(0.2 0.01 80 / 0.08), 0 1px 2px oklch(0.2 0.01 80 / 0.06);
    }
  </style>
</head>
<body>
</body>
</html>
